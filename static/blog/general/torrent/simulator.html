<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Architecture Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans flex flex-col h-full">

    <div class="p-4 sm:p-6 border-b border-zinc-800 bg-zinc-900 flex flex-col sm:flex-row sm:items-center justify-between gap-4 z-10">
        <div>
            <h1 class="text-lg sm:text-xl font-semibold tracking-tight text-white">Network Transfer Visualizer</h1>
            <p class="text-sm text-zinc-400 mt-1">Comparing data distribution models.</p>
        </div>
        <div class="flex flex-wrap gap-3 items-center">
            <select id="modeSelect" class="bg-zinc-800 border border-zinc-700 text-sm rounded-md px-3 py-2 outline-none focus:border-zinc-500">
                <option value="direct">Direct (1-to-1)</option>
                <option value="server">Client-Server (1-to-Many)</option>
                <option value="torrent">Torrent Swarm (Many-to-Many)</option>
            </select>
            <button id="startBtn" class="bg-white text-black px-5 py-2 rounded-md text-sm font-medium hover:bg-zinc-200 transition-colors">
                Start Simulation
            </button>
            <button id="resetBtn" class="bg-zinc-800 text-white border border-zinc-700 px-5 py-2 rounded-md text-sm font-medium hover:bg-zinc-700 transition-colors">
                Reset
            </button>
        </div>
    </div>

    <div class="flex-1 relative w-full min-h-0" id="canvasContainer">
        <canvas id="simCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        let nodes = [];
        let packets = [];
        let animationId;
        let isRunning = false;
        let currentMode = 'direct';

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if (!isRunning) draw();
        }
        window.addEventListener('resize', resize);

        class Node {
            constructor(x, y, label, isSource = false) {
                this.x = x;
                this.y = y;
                this.label = label;
                this.progress = isSource ? 100 : 0;
                this.isSource = isSource;
                this.radius = 24;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.progress === 100 ? '#10b981' : '#27272a';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = this.isSource ? '#10b981' : '#52525b';
                ctx.stroke();

                if (!this.isSource) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 6, -Math.PI / 2, (-Math.PI / 2) + (Math.PI * 2 * (this.progress / 100)));
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                ctx.fillStyle = '#ffffff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(this.label, this.x, this.y + this.radius + 24);

                ctx.fillStyle = this.progress === 100 ? '#000000' : '#ffffff';
                ctx.fillText(`${Math.floor(this.progress)}%`, this.x, this.y + 4);
            }
        }

        class Packet {
            constructor(source, target, speed) {
                this.source = source;
                this.target = target;
                this.progress = 0;
                this.speed = speed;
                this.active = true;
            }

            update() {
                this.progress += this.speed;
                if (this.progress >= 1) {
                    this.active = false;
                    if (this.target.progress < 100) {
                        this.target.progress = Math.min(100, this.target.progress + 5);
                    }
                }
            }

            draw() {
                if (!this.active) return;
                const currentX = this.source.x + (this.target.x - this.source.x) * this.progress;
                const currentY = this.source.y + (this.target.y - this.source.y) * this.progress;

                ctx.beginPath();
                ctx.arc(currentX, currentY, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#60a5fa';
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#60a5fa';
                ctx.shadowBlur = 0;
            }
        }

        function initSimulation(mode) {
            nodes = [];
            packets = [];
            currentMode = mode;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            if (mode === 'direct') {
                nodes.push(new Node(cx - 200, cy, 'Sender PC', true));
                nodes.push(new Node(cx + 200, cy, 'Receiver PC', false));
            } else if (mode === 'server') {
                nodes.push(new Node(cx, cy, 'Central Server', true));
                const radius = 200;
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 * i) / 6;
                    nodes.push(new Node(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius, `Client ${i + 1}`, false));
                }
            } else if (mode === 'torrent') {
                nodes.push(new Node(cx, cy, 'Initial Seeder', true));
                const radius = 200;
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 * i) / 6;
                    nodes.push(new Node(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius, `Peer ${i + 1}`, false));
                }
            }
            draw();
        }

        function animate() {
            if (!isRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.1) {
                if (currentMode === 'direct') {
                    if (nodes[1].progress < 100) packets.push(new Packet(nodes[0], nodes[1], 0.02));
                } else if (currentMode === 'server') {
                    const incompleteClients = nodes.filter(n => !n.isSource && n.progress < 100);
                    if (incompleteClients.length > 0) {
                        const target = incompleteClients[Math.floor(Math.random() * incompleteClients.length)];
                        packets.push(new Packet(nodes[0], target, 0.008));
                    }
                } else if (currentMode === 'torrent') {
                    const activeSenders = nodes.filter(n => n.progress > 0);
                    const incompletePeers = nodes.filter(n => n.progress < 100);

                    if (incompletePeers.length > 0 && activeSenders.length > 0) {
                        for (let i = 0; i < 3; i++) {
                            const sender = activeSenders[Math.floor(Math.random() * activeSenders.length)];
                            const target = incompletePeers[Math.floor(Math.random() * incompletePeers.length)];
                            if (sender !== target) {
                                packets.push(new Packet(sender, target, 0.015));
                            }
                        }
                    }
                }
            }

            for (let i = packets.length - 1; i >= 0; i--) {
                packets[i].update();
                packets[i].draw();
                if (!packets[i].active) packets.splice(i, 1);
            }

            nodes.forEach(node => node.draw());

            const allDone = nodes.every(n => n.progress === 100);
            if (allDone) {
                isRunning = false;
                document.getElementById('startBtn').innerText = 'Completed';
            } else {
                animationId = requestAnimationFrame(animate);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#27272a';
            ctx.lineWidth = 1;

            if (currentMode === 'server' || currentMode === 'direct') {
                nodes.forEach((node, index) => {
                    if (index > 0) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[0].x, nodes[0].y);
                        ctx.lineTo(node.x, node.y);
                        ctx.stroke();
                    }
                });
            } else if (currentMode === 'torrent') {
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }

            nodes.forEach(node => node.draw());
        }

        document.getElementById('modeSelect').addEventListener('change', (e) => {
            isRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('startBtn').innerText = 'Start Simulation';
            initSimulation(e.target.value);
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!isRunning && !nodes.every(n => n.progress === 100)) {
                isRunning = true;
                document.getElementById('startBtn').innerText = 'Running...';
                animate();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            isRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('startBtn').innerText = 'Start Simulation';
            initSimulation(document.getElementById('modeSelect').value);
        });

        resize();
        initSimulation('direct');
    </script>
</body>
</html>
